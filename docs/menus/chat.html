<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPATREE - AI 채팅</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1B5E20',
            'primary-hover': '#145218',
          }
        }
      }
    }
  </script>
  <style>
    body { font-size: 18px; line-height: 1.8; }
  </style>
</head>
<body class="bg-white min-h-screen">
  <div class="max-w-md mx-auto bg-white min-h-screen flex flex-col">
    <!-- Header -->
    <header class="flex items-center gap-3 px-4 py-4 border-b border-gray-200">
      <a href="home.html" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-gray-100" aria-label="뒤로가기">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <div>
        <h1 class="text-xl font-bold text-gray-800">AI 채팅</h1>
        <p class="text-sm text-gray-500">오디오북 추천 상담</p>
      </div>
    </header>

    <!-- Chat Messages -->
    <main class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
      <!-- AI Welcome -->
      <div class="flex gap-3">
        <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center flex-shrink-0">
          <span class="text-lg">🤖</span>
        </div>
        <div class="bg-gray-100 rounded-2xl rounded-tl-none px-5 py-3 max-w-[80%]">
          <p class="text-gray-800">안녕하세요! 오디오북 추천 AI입니다. 어떤 책을 찾고 계신가요?</p>
          <button class="mt-2 text-sm text-blue-600 flex items-center gap-1" aria-label="음성으로 듣기">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            음성으로 듣기
          </button>
        </div>
      </div>

      <!-- User Message -->
      <div class="flex justify-end">
        <div class="bg-primary text-white rounded-2xl rounded-tr-none px-5 py-3 max-w-[80%]">
          <p>편안한 마음으로 들을 수 있는 책은?</p>
        </div>
      </div>

      <!-- AI Response -->
      <div class="flex gap-3">
        <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center flex-shrink-0">
          <span class="text-lg">🤖</span>
        </div>
        <div class="bg-gray-100 rounded-2xl rounded-tl-none px-5 py-3 max-w-[80%]">
          <p class="text-gray-800 mb-3">마음이 따뜻해지는 오디오북 3권을 추천드립니다:</p>

          <!-- Recommendation Cards -->
          <div class="space-y-2">
            <a href="player.html" class="block bg-white rounded-xl p-3 border border-gray-200 hover:border-primary transition-colors">
              <p class="font-bold text-gray-800">📖 나미야 잡화점의 기적</p>
              <p class="text-sm text-gray-500">히가시노 게이고 | 6시간 30분</p>
            </a>
            <a href="player.html" class="block bg-white rounded-xl p-3 border border-gray-200 hover:border-primary transition-colors">
              <p class="font-bold text-gray-800">📖 아몬드</p>
              <p class="text-sm text-gray-500">손원평 | 4시간 15분</p>
            </a>
            <a href="player.html" class="block bg-white rounded-xl p-3 border border-gray-200 hover:border-primary transition-colors">
              <p class="font-bold text-gray-800">📖 달러구트 꿈 백화점</p>
              <p class="text-sm text-gray-500">이미예 | 5시간 45분</p>
            </a>
          </div>

          <button class="mt-3 text-sm text-blue-600 flex items-center gap-1" aria-label="음성으로 듣기">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            음성으로 듣기
          </button>
        </div>
      </div>
    </main>

    <!-- Preset Messages -->
    <div class="px-4 py-2 overflow-x-auto">
      <div class="flex gap-2 whitespace-nowrap">
        <button class="px-4 py-2 bg-orange-50 text-orange-700 rounded-full text-base border border-orange-200 hover:bg-orange-100 transition-colors">오늘 듣기 좋은 책 추천해주세요</button>
        <button class="px-4 py-2 bg-orange-50 text-orange-700 rounded-full text-base border border-orange-200 hover:bg-orange-100 transition-colors">감동적인 이야기를 찾고 있어요</button>
        <button class="px-4 py-2 bg-orange-50 text-orange-700 rounded-full text-base border border-orange-200 hover:bg-orange-100 transition-colors">역사 관련 책을 추천해주세요</button>
        <button class="px-4 py-2 bg-orange-50 text-orange-700 rounded-full text-base border border-orange-200 hover:bg-orange-100 transition-colors">편안한 마음으로 들을 수 있는 책은?</button>
      </div>
    </div>

    <!-- Input Area -->
    <div class="px-4 py-3 border-t border-gray-200 bg-white">
      <div class="flex items-center gap-2">
        <button class="w-12 h-12 bg-red-500 text-white rounded-full flex items-center justify-center flex-shrink-0 hover:bg-red-600 transition-colors" aria-label="음성 입력">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
        <input type="text" class="flex-1 bg-gray-100 rounded-xl px-4 py-3 text-lg outline-none focus:ring-2 focus:ring-primary" placeholder="메시지를 입력하세요...">
        <button class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center flex-shrink-0 hover:bg-primary-hover transition-colors" aria-label="전송">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <!-- Bottom Tab Bar -->
    <nav class="border-t border-gray-200 bg-white">
      <div class="flex">
        <a href="home.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <span class="text-sm mt-1">홈</span>
        </a>
        <a href="search.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <span class="text-sm mt-1">검색</span>
        </a>
        <a href="chat.html" class="flex-1 flex flex-col items-center py-3 text-primary border-t-2 border-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span class="text-sm font-bold mt-1">AI 채팅</span>
        </a>
        <a href="library.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          <span class="text-sm mt-1">내 서재</span>
        </a>
      </div>
    </nav>
  </div>
</body>
</html>
