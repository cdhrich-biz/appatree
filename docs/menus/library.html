<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPATREE - 내 서재</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1B5E20',
            'primary-hover': '#145218',
          }
        }
      }
    }
  </script>
  <style>
    body { font-size: 18px; line-height: 1.8; }
  </style>
</head>
<body class="bg-white min-h-screen">
  <div class="max-w-md mx-auto bg-white min-h-screen flex flex-col">
    <!-- Header -->
    <header class="flex items-center gap-3 px-4 py-4 border-b border-gray-200">
      <a href="home.html" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-gray-100" aria-label="뒤로가기">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <h1 class="text-xl font-bold text-gray-800">내 서재</h1>
    </header>

    <!-- Tabs -->
    <div class="flex border-b border-gray-200">
      <button class="flex-1 py-4 text-center text-lg font-bold text-primary border-b-2 border-primary">즐겨찾기</button>
      <button class="flex-1 py-4 text-center text-lg text-gray-500 hover:text-gray-700">최근 재생</button>
    </div>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto px-4 py-4">
      <div class="space-y-3">
        <!-- Bookmark Item 1 -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4">
          <div class="flex gap-4">
            <div class="w-20 h-14 bg-gray-200 rounded-xl flex items-center justify-center flex-shrink-0">
              <span class="text-xl">📖</span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-lg font-bold text-gray-800 truncate">삼국지 완독 오디오북</h3>
              <p class="text-base text-gray-500">한국 오디오북 채널</p>
              <p class="text-sm text-gray-400 mt-1">마지막 재생: 2026-04-03</p>
            </div>
          </div>
          <div class="flex gap-2 mt-3 justify-end">
            <a href="player.html" class="px-5 py-2 bg-primary text-white rounded-xl text-base font-semibold flex items-center gap-2 hover:bg-primary-hover transition-colors min-h-[48px]">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              재생
            </a>
            <button class="px-4 py-2 text-red-500 border-2 border-red-200 rounded-xl text-base hover:bg-red-50 transition-colors flex items-center gap-2 min-h-[48px]" aria-label="삭제">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
              삭제
            </button>
          </div>
        </div>

        <!-- Bookmark Item 2 -->
        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4">
          <div class="flex gap-4">
            <div class="w-20 h-14 bg-gray-200 rounded-xl flex items-center justify-center flex-shrink-0">
              <span class="text-xl">🏛️</span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-lg font-bold text-gray-800 truncate">조선왕조실록 이야기</h3>
              <p class="text-base text-gray-500">역사 이야기 채널</p>
              <p class="text-sm text-gray-400 mt-1">마지막 재생: 2026-04-01</p>
            </div>
          </div>
          <div class="flex gap-2 mt-3 justify-end">
            <a href="player.html" class="px-5 py-2 bg-primary text-white rounded-xl text-base font-semibold flex items-center gap-2 hover:bg-primary-hover transition-colors min-h-[48px]">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              재생
            </a>
            <button class="px-4 py-2 text-red-500 border-2 border-red-200 rounded-xl text-base hover:bg-red-50 transition-colors flex items-center gap-2 min-h-[48px]" aria-label="삭제">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
              삭제
            </button>
          </div>
        </div>

        <!-- Empty State (hidden by default, shown when no bookmarks) -->
        <!--
        <div class="text-center py-12">
          <p class="text-xl text-gray-400 mb-4">즐겨찾기한 책이 없습니다</p>
          <a href="search.html" class="inline-block px-6 py-3 bg-primary text-white rounded-2xl text-lg font-semibold">책 찾아보기</a>
        </div>
        -->
      </div>
    </main>

    <!-- Bottom Tab Bar -->
    <nav class="border-t border-gray-200 bg-white">
      <div class="flex">
        <a href="home.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <span class="text-sm mt-1">홈</span>
        </a>
        <a href="search.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <span class="text-sm mt-1">검색</span>
        </a>
        <a href="chat.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span class="text-sm mt-1">AI 채팅</span>
        </a>
        <a href="library.html" class="flex-1 flex flex-col items-center py-3 text-primary border-t-2 border-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          <span class="text-sm font-bold mt-1">내 서재</span>
        </a>
      </div>
    </nav>
  </div>
</body>
</html>
