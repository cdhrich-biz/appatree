<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPATREE - 검색 결과</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1B5E20',
            'primary-hover': '#145218',
          }
        }
      }
    }
  </script>
  <style>
    body { font-size: 18px; line-height: 1.8; }
  </style>
</head>
<body class="bg-white min-h-screen">
  <div class="max-w-md mx-auto bg-white min-h-screen flex flex-col">
    <!-- Header -->
    <header class="flex items-center gap-3 px-4 py-4 border-b border-gray-200">
      <a href="home.html" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-gray-100" aria-label="뒤로가기">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <h1 class="text-xl font-bold text-gray-800">"역사 소설" 검색 결과</h1>
    </header>

    <!-- Search Bar -->
    <div class="px-4 py-3 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <div class="flex-1 flex items-center bg-gray-100 rounded-xl px-4 py-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" value="역사 소설" class="bg-transparent flex-1 ml-3 text-lg text-gray-800 outline-none" placeholder="검색어를 입력하세요">
        </div>
        <button class="w-12 h-12 bg-primary text-white rounded-xl flex items-center justify-center" aria-label="음성 검색">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Sort Options -->
    <div class="flex gap-2 px-4 py-3">
      <button class="px-4 py-2 bg-primary text-white rounded-xl text-base font-semibold">관련성</button>
      <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl text-base hover:bg-gray-200">최신순</button>
      <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl text-base hover:bg-gray-200">조회수</button>
    </div>

    <!-- Results -->
    <main class="flex-1 overflow-y-auto px-4 pb-4">
      <div class="space-y-3">
        <!-- Result Card 1 -->
        <a href="player.html" class="block bg-white border-2 border-gray-200 rounded-2xl p-4 hover:border-primary hover:bg-green-50 transition-colors">
          <div class="flex gap-4">
            <div class="w-24 h-16 bg-gray-200 rounded-xl flex items-center justify-center flex-shrink-0">
              <span class="text-2xl">📖</span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-lg font-bold text-gray-800 truncate">삼국지 완독 오디오북 - 전체 낭독</h3>
              <p class="text-base text-gray-500">한국 오디오북 채널</p>
              <div class="flex items-center gap-3 mt-1 text-sm text-gray-400">
                <span>12:34:56</span>
                <span>조회수 125만</span>
              </div>
            </div>
            <div class="flex items-center">
              <div class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              </div>
            </div>
          </div>
        </a>

        <!-- Result Card 2 -->
        <a href="player.html" class="block bg-white border-2 border-gray-200 rounded-2xl p-4 hover:border-primary hover:bg-green-50 transition-colors">
          <div class="flex gap-4">
            <div class="w-24 h-16 bg-gray-200 rounded-xl flex items-center justify-center flex-shrink-0">
              <span class="text-2xl">🏛️</span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-lg font-bold text-gray-800 truncate">조선왕조실록 이야기 - 태조부터 순종까지</h3>
              <p class="text-base text-gray-500">역사 이야기 채널</p>
              <div class="flex items-center gap-3 mt-1 text-sm text-gray-400">
                <span>8:22:30</span>
                <span>조회수 89만</span>
              </div>
            </div>
            <div class="flex items-center">
              <div class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              </div>
            </div>
          </div>
        </a>

        <!-- Result Card 3 -->
        <a href="player.html" class="block bg-white border-2 border-gray-200 rounded-2xl p-4 hover:border-primary hover:bg-green-50 transition-colors">
          <div class="flex gap-4">
            <div class="w-24 h-16 bg-gray-200 rounded-xl flex items-center justify-center flex-shrink-0">
              <span class="text-2xl">📚</span>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-lg font-bold text-gray-800 truncate">한국사 명장면 - 역사 속 영웅들</h3>
              <p class="text-base text-gray-500">시니어 오디오북</p>
              <div class="flex items-center gap-3 mt-1 text-sm text-gray-400">
                <span>5:45:12</span>
                <span>조회수 56만</span>
              </div>
            </div>
            <div class="flex items-center">
              <div class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              </div>
            </div>
          </div>
        </a>

        <!-- AI Recommend CTA -->
        <div class="text-center py-4">
          <a href="chat.html" class="inline-flex items-center gap-2 px-6 py-3 bg-orange-100 text-orange-700 rounded-2xl text-lg font-semibold hover:bg-orange-200 transition-colors">
            <span>💬</span> AI에게 더 추천받기
          </a>
        </div>
      </div>
    </main>

    <!-- Bottom Tab Bar -->
    <nav class="border-t border-gray-200 bg-white">
      <div class="flex">
        <a href="home.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <span class="text-sm mt-1">홈</span>
        </a>
        <a href="search.html" class="flex-1 flex flex-col items-center py-3 text-primary border-t-2 border-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <span class="text-sm font-bold mt-1">검색</span>
        </a>
        <a href="chat.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span class="text-sm mt-1">AI 채팅</span>
        </a>
        <a href="library.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          <span class="text-sm mt-1">내 서재</span>
        </a>
      </div>
    </nav>
  </div>
</body>
</html>
