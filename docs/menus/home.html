<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPATREE - 홈</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1B5E20',
            'primary-hover': '#145218',
          }
        }
      }
    }
  </script>
  <style>
    body { font-size: 18px; line-height: 1.8; }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    .pulse-ring { animation: pulse-ring 1.5s ease-out infinite; }
  </style>
</head>
<body class="bg-white min-h-screen">
  <div class="max-w-md mx-auto bg-white min-h-screen flex flex-col">
    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <div class="flex items-center gap-3">
        <span class="text-3xl">🎧</span>
        <h1 class="text-2xl font-bold text-primary">아빠트리</h1>
      </div>
      <a href="settings.html" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-gray-100" aria-label="설정">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4B5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </a>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center px-6 py-8">
      <!-- Voice Button -->
      <div class="relative mb-6">
        <div class="absolute inset-0 bg-primary rounded-full pulse-ring"></div>
        <button class="relative w-[170px] h-[170px] bg-primary text-white rounded-full flex flex-col items-center justify-center shadow-lg hover:bg-primary-hover transition-colors" aria-label="음성으로 검색하기">
          <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
          <span class="text-lg font-bold mt-2">눌러서 말하기</span>
        </button>
      </div>

      <!-- Status Message -->
      <p class="text-xl text-gray-600 mb-8 text-center">버튼을 누르고 찾고 싶은 책을 말해보세요</p>

      <!-- Category Grid -->
      <div class="w-full grid grid-cols-2 gap-4">
        <a href="search.html" class="flex items-center gap-3 bg-gray-50 border-2 border-gray-200 rounded-2xl p-4 hover:bg-gray-100 transition-colors min-h-[56px]">
          <span class="text-2xl">📖</span>
          <span class="text-xl font-semibold text-gray-800">소설</span>
        </a>
        <a href="search.html" class="flex items-center gap-3 bg-gray-50 border-2 border-gray-200 rounded-2xl p-4 hover:bg-gray-100 transition-colors min-h-[56px]">
          <span class="text-2xl">✍️</span>
          <span class="text-xl font-semibold text-gray-800">에세이</span>
        </a>
        <a href="search.html" class="flex items-center gap-3 bg-gray-50 border-2 border-gray-200 rounded-2xl p-4 hover:bg-gray-100 transition-colors min-h-[56px]">
          <span class="text-2xl">🏛️</span>
          <span class="text-xl font-semibold text-gray-800">역사</span>
        </a>
        <a href="search.html" class="flex items-center gap-3 bg-gray-50 border-2 border-gray-200 rounded-2xl p-4 hover:bg-gray-100 transition-colors min-h-[56px]">
          <span class="text-2xl">💼</span>
          <span class="text-xl font-semibold text-gray-800">경제</span>
        </a>
        <a href="search.html" class="flex items-center gap-3 bg-gray-50 border-2 border-gray-200 rounded-2xl p-4 hover:bg-gray-100 transition-colors min-h-[56px]">
          <span class="text-2xl">🌱</span>
          <span class="text-xl font-semibold text-gray-800">자기계발</span>
        </a>
        <a href="search.html" class="flex items-center gap-3 bg-gray-50 border-2 border-gray-200 rounded-2xl p-4 hover:bg-gray-100 transition-colors min-h-[56px]">
          <span class="text-2xl">⭐</span>
          <span class="text-xl font-semibold text-gray-800">인기</span>
        </a>
      </div>
    </main>

    <!-- Bottom Tab Bar -->
    <nav class="border-t border-gray-200 bg-white">
      <div class="flex">
        <a href="home.html" class="flex-1 flex flex-col items-center py-3 text-primary border-t-2 border-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          <span class="text-sm font-bold mt-1">홈</span>
        </a>
        <a href="search.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <span class="text-sm mt-1">검색</span>
        </a>
        <a href="chat.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span class="text-sm mt-1">AI 채팅</span>
        </a>
        <a href="library.html" class="flex-1 flex flex-col items-center py-3 text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          <span class="text-sm mt-1">내 서재</span>
        </a>
      </div>
    </nav>
  </div>
</body>
</html>
